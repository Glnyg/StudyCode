openapi: 3.1.0
info:
  title: Media Service Contract V1
  version: 1.0.0
  description: Tenant-scoped fixed asset management APIs. Tenant scope is always resolved from a single-tenant bearer token session; clients must not send tenant_id in headers, query, or body. Errors return real non-2xx HTTP status codes plus a JSON error envelope; these surfaces do not use outer 200 wrappers, and GET operations do not accept request bodies.
servers:
  - url: https://api.example.internal
security:
  - bearerAuth: []
paths:
  /v1/assets:
    post:
      operationId: uploadAsset
      summary: Upload a fixed outbound asset.
      x-required-permissions:
        - media.asset.write
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUploadRequest'
      responses:
        '202':
          description: Asset accepted for governance workflow.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetItem'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      operationId: listAssets
      summary: List tenant-scoped assets.
      x-required-permissions:
        - media.asset.read
      parameters:
        - name: asset_type
          in: query
          schema:
            type: string
        - name: review_status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Asset list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssetItem'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/assets/{asset_id}:review:
    post:
      operationId: reviewAsset
      summary: Move an asset through review workflow.
      x-required-permissions:
        - media.review
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [target_status]
              properties:
                target_status:
                  type: string
                  enum: [review, approved, rejected]
                note:
                  type: string
      responses:
        '200':
          description: Asset review state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetItem'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /v1/assets/{asset_id}:preview-url:
    post:
      operationId: createAssetPreviewUrl
      summary: Create a short-lived preview URL for a tenant asset.
      x-required-permissions:
        - media.asset.read
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview URL created.
          content:
            application/json:
              schema:
                type: object
                required: [asset_id, preview_url, expires_at]
                properties:
                  asset_id:
                    type: string
                  preview_url:
                    type: string
                    format: uri
                  expires_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Single-tenant operator session token. Required claims are sub, tenant_id, actor_type, role, permissions, and session_id. Platform-admin flows must use explicit admin surfaces instead of these tenant-scoped endpoints.
  responses:
    UnauthorizedError:
      description: Identity is missing, expired, or cannot be verified before a trusted tenant context is created.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: gateway.identity_invalid
            message: Bearer token is missing or invalid.
            category: auth
            error_source: gateway
            retryable: false
            correlation_id: corr-001
    ForbiddenError:
      description: Identity is valid, but tenant scope, permissions, or admin-surface rules reject the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: media.permission_denied
            message: The resolved actor cannot access this media surface.
            category: authorization
            error_source: system
            retryable: false
            correlation_id: corr-001
    ErrorResponse:
      description: Standard error envelope used with real HTTP status codes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message, category, error_source, retryable, correlation_id]
      properties:
        code:
          type: string
        message:
          type: string
        category:
          type: string
        error_source:
          type: string
          enum: [gateway, system]
        retryable:
          type: boolean
        correlation_id:
          type: string
    AssetUploadRequest:
      type: object
      additionalProperties: false
      required: [asset_type, source_object_key]
      properties:
        asset_type:
          type: string
          enum: [image, video, link_card]
        source_object_key:
          type: string
        business_tags:
          type: array
          items:
            type: string
        channel_support:
          type: array
          items:
            type: string
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
    AssetItem:
      type: object
      required: [asset_id, tenant_id, asset_type, review_status, version]
      properties:
        asset_id:
          type: string
        tenant_id:
          type: string
        asset_type:
          type: string
        business_tags:
          type: array
          items:
            type: string
        channel_support:
          type: array
          items:
            type: string
        review_status:
          type: string
          enum: [draft, review, approved, rejected]
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
        version:
          type: integer
