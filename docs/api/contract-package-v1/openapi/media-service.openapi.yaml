openapi: 3.1.0
info:
  title: Media Service Contract V1
  version: 1.0.0
  description: Tenant-scoped fixed asset management APIs.
servers:
  - url: https://api.example.internal
security:
  - bearerAuth: []
paths:
  /v1/assets:
    post:
      operationId: uploadAsset
      summary: Upload a fixed outbound asset.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUploadRequest'
      responses:
        '202':
          description: Asset accepted for governance workflow.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetItem'
        '409':
          $ref: '#/components/responses/ErrorResponse'
    get:
      operationId: listAssets
      summary: List tenant-scoped assets.
      parameters:
        - name: asset_type
          in: query
          schema:
            type: string
        - name: review_status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Asset list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssetItem'
  /v1/assets/{asset_id}:review:
    post:
      operationId: reviewAsset
      summary: Move an asset through review workflow.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_status]
              properties:
                target_status:
                  type: string
                  enum: [review, approved, rejected]
                note:
                  type: string
      responses:
        '200':
          description: Asset review state updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetItem'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /v1/assets/{asset_id}:preview-url:
    post:
      operationId: createAssetPreviewUrl
      summary: Create a short-lived preview URL for a tenant asset.
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview URL created.
          content:
            application/json:
              schema:
                type: object
                required: [asset_id, preview_url, expires_at]
                properties:
                  asset_id:
                    type: string
                  preview_url:
                    type: string
                    format: uri
                  expires_at:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Standard error envelope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message, category, retryable, correlation_id]
      properties:
        code:
          type: string
        message:
          type: string
        category:
          type: string
        retryable:
          type: boolean
        correlation_id:
          type: string
    AssetUploadRequest:
      type: object
      required: [asset_type, source_object_key]
      properties:
        asset_type:
          type: string
          enum: [image, video, link_card]
        source_object_key:
          type: string
        business_tags:
          type: array
          items:
            type: string
        channel_support:
          type: array
          items:
            type: string
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
    AssetItem:
      type: object
      required: [asset_id, asset_type, review_status, version]
      properties:
        asset_id:
          type: string
        asset_type:
          type: string
        business_tags:
          type: array
          items:
            type: string
        channel_support:
          type: array
          items:
            type: string
        review_status:
          type: string
          enum: [draft, review, approved, rejected]
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
        version:
          type: integer
