openapi: 3.1.0
info:
  title: Search Service Contract V1
  version: 1.0.0
  description: Tenant-safe chat history search contracts. Tenant scope is always resolved from a single-tenant bearer token session; clients must not send tenant_id in headers, query, or body. Errors return real non-2xx HTTP status codes plus a JSON error envelope; these surfaces do not use outer 200 wrappers, and GET operations do not accept request bodies.
servers:
  - url: https://api.example.internal
security:
  - bearerAuth: []
paths:
  /v1/search/messages:
    post:
      operationId: searchMessages
      summary: Search chat history for the current tenant.
      x-required-permissions:
        - search.read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMessagesRequest'
            example:
              q: 套餐 续费
              channel: wechat_customer_service
              queue_id: after_sales
              from_time: '2026-04-01T00:00:00Z'
              to_time: '2026-04-24T23:59:59Z'
              page_size: 50
      responses:
        '200':
          description: Search result page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMessagesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /v1/search/autocomplete:
    get:
      operationId: autocompleteSearchHints
      summary: Autocomplete search hints for a tenant-scoped prefix.
      x-required-permissions:
        - search.read
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        '200':
          description: Suggestion list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/search/health:
    get:
      operationId: getSearchHealth
      summary: Health surface for the tenant-visible search projection.
      x-required-permissions:
        - search.read
      responses:
        '200':
          description: Health snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [status, projection_lag_seconds]
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                  projection_lag_seconds:
                    type: integer
                  last_successful_event_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Single-tenant operator session token. Required claims are sub, tenant_id, actor_type, role, permissions, and session_id. Platform-admin flows must use explicit admin surfaces instead of these tenant-scoped endpoints.
  responses:
    UnauthorizedError:
      description: Identity is missing, expired, or cannot be verified before a trusted tenant context is created.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: gateway.identity_invalid
            message: Bearer token is missing or invalid.
            category: auth
            error_source: gateway
            retryable: false
            correlation_id: corr-001
    ForbiddenError:
      description: Identity is valid, but tenant scope, permissions, or admin-surface rules reject the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            code: search.permission_denied
            message: The resolved actor cannot access this search surface.
            category: authorization
            error_source: system
            retryable: false
            correlation_id: corr-001
    ErrorResponse:
      description: Standard error envelope used with real HTTP status codes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required: [code, message, category, error_source, retryable, correlation_id]
      properties:
        code:
          type: string
        message:
          type: string
        category:
          type: string
        error_source:
          type: string
          enum: [gateway, system]
        retryable:
          type: boolean
        correlation_id:
          type: string
    SearchMessagesRequest:
      type: object
      additionalProperties: false
      properties:
        q:
          type: string
        from_time:
          type: string
          format: date-time
        to_time:
          type: string
          format: date-time
        customer_id:
          type: string
        agent_id:
          type: string
        channel:
          type: string
        queue_id:
          type: string
        conversation_status:
          type: string
        message_type:
          type: string
        has_media:
          type: boolean
        device_id:
          type: string
        order_id:
          type: string
        tags:
          type: array
          items:
            type: string
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        search_after:
          type: array
          items:
            type: string
    SearchHit:
      type: object
      required: [conversation_id, message_id, occurred_at, sender_type, channel, highlights]
      properties:
        conversation_id:
          type: string
        message_id:
          type: string
        occurred_at:
          type: string
          format: date-time
        sender_type:
          type: string
        channel:
          type: string
        queue_id:
          type: string
        conversation_status:
          type: string
        highlights:
          type: array
          items:
            type: string
        has_media:
          type: boolean
        device_id:
          type: string
        order_id:
          type: string
    SearchMessagesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchHit'
        next_search_after:
          type: array
          items:
            type: string
